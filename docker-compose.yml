version: "3.9"

services:
  etoro-agent:
    build: .
    container_name: etoro-agent
    restart: always
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    # Optional: expose nothing (bot runs headless)
    # ports: []
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
